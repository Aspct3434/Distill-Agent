<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Distill TUI</title>
  <desc id="desc">Distill TUI logo with a terminal command prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="34" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="252" rx="22" fill="#030712" stroke="#273449" stroke-width="2"/>
  <path d="M62 98H1138" stroke="#1F2937" stroke-width="2"/>
  <circle cx="82" cy="66" r="9" fill="#F87171"/>
  <circle cx="112" cy="66" r="9" fill="#FBBF24"/>
  <circle cx="142" cy="66" r="9" fill="#34D399"/>

  <path d="M117 155L164 188L117 221" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M196 230H282" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
  <path d="M96 151L143 184L96 217" fill="none" stroke="#22D3EE" stroke-opacity="0.18" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>

  <text x="330" y="176" fill="#F9FAFB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="76" font-weight="800">DISTILL TUI</text>
  <text x="334" y="218" fill="#9CA3AF" font-family="Consolas, Menlo, Monaco, monospace" font-size="28">$ distill</text>
  <text x="334" y="250" fill="#67E8F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Interactive terminal interface for the autonomous agent runtime</text>

  <rect x="974" y="134" width="112" height="36" rx="18" fill="#111827" stroke="#374151"/>
  <text x="1003" y="158" fill="#34D399" font-family="Consolas, Menlo, Monaco, monospace" font-size="18" font-weight="700">LIVE</text>
  <rect x="978" y="192" width="82" height="9" rx="4.5" fill="#22D3EE"/>
  <rect x="978" y="214" width="128" height="9" rx="4.5" fill="#A855F7"/>
  <rect x="978" y="236" width="104" height="9" rx="4.5" fill="#34D399"/>
</svg>
